# Fcitx5 classicui theme — Nano Desktop Adwaita-dark.
# Palette matches fuzzel/sfwbar: #242226 panel, white text, #3584e4 accent,
# #1c1c1f border. Rounded corners come from the 9-sliced panel/highlight
# images (classicui has no corner-radius field); the Background/Highlight
# Margin sections define the slice insets and must cover the corner radius.

[Metadata]
Name=NanoAdwaita
Version=1
Author=Nano Desktop
Description=Adwaita-dark candidate window matching the Nano Desktop palette

[InputPanel]
NormalColor=#ffffffff
HighlightColor=#ffffffff
HighlightBackgroundColor=#3584e4ff
HighlightCandidateColor=#ffffffff
CandidateLabelColor=#ffffff80
HighlightCandidateLabelColor=#ffffffff
FullWidthHighlight=True

[InputPanel/Background]
Image=panel.png

[InputPanel/Background/Margin]
Left=16
Right=16
Top=16
Bottom=16

[InputPanel/Highlight]
Image=highlight.png

[InputPanel/Highlight/Margin]
Left=8
Right=8
Top=8
Bottom=8

[InputPanel/ContentMargin]
Left=12
Right=12
Top=12
Bottom=12

[InputPanel/TextMargin]
Left=8
Right=8
Top=4
Bottom=4

[Menu]
NormalColor=#ffffffff
HighlightCandidateColor=#ffffffff
Spacing=2

[Menu/Background]
Image=panel.png

[Menu/Background/Margin]
Left=16
Right=16
Top=16
Bottom=16

[Menu/Highlight]
Image=highlight.png

[Menu/Highlight/Margin]
Left=8
Right=8
Top=8
Bottom=8

[Menu/Separator]
Color=#ffffff1e

[Menu/ContentMargin]
Left=6
Right=6
Top=6
Bottom=6

[Menu/TextMargin]
Left=8
Right=8
Top=4
Bottom=4
