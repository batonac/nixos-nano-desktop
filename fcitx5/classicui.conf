# Fcitx5 classic UI: candidate window styling. The nano-adwaita theme
# (share/fcitx5/themes/nano-adwaita, built from ./fcitx5/theme) matches the
# desktop's Adwaita-dark palette; set as both light and dark variant so the
# look is identical regardless of the system color-scheme signal.
Vertical Candidate List=True
PerScreenDPI=False
Font=Adwaita Sans 11
MenuFont=Adwaita Sans 11
TrayFont=Adwaita Sans Bold 10
Theme=nano-adwaita
DarkTheme=nano-adwaita
