# Fcitx5 clipboard-history addon: the Windows-11-style Super+V picker.
# Super+V (while a text field is focused) opens the history as a candidate
# list at the caret; picking an entry COMMITS the text through the input
# context — true paste-at-cursor, no synthetic Ctrl+V needed. Global keys
# must precede the [TriggerKey] section (INI global section comes first).

# History length shown in the picker (fcitx5 caps this at 30).
Number of entries=30
ShowPassword=False
# Skip clipboard entries tagged x-kde-passwordManagerHint (password managers).
IgnorePasswordFromPasswordManager=True
ClearPasswordAfter=30

# The keysym MUST be the uppercase letter: fcitx matches hotkeys against the
# normalized key, and normalization maps letter keys to their uppercase keysym
# (journal trace: pressing Super+v arrives as Key(Super+V); "Super+v" never
# matches — the picker silently does nothing). fcitx's own letter-key defaults
# (Control+Alt+Shift+U etc.) follow the same uppercase convention.
[TriggerKey]
0=Super+V

# Bare section header = explicitly empty list (no paste-primary key).
[PastePrimaryKey]
