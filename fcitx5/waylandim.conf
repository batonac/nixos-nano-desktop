# Fcitx5 Wayland input-method frontend. Keep the zwp_virtual_keyboard_v1
# object alive across activate/deactivate: without this, fcitx creates and
# destroys the virtual keyboard on every text-field focus change, and each
# create pushes a fresh keymap through labwc into Xwayland — which re-runs
# xkbcomp and spams the journal with "Unsupported maximum keycode 709,
# clipping" warnings on every focus change.
PersistentVirtualKeyboard=True
