# Nano Desktop fuzzel launcher — modern Adwaita DARK.
# Opened from the Sfwbar Start button and the F12 / Alt-F2 keybinds. Installed
# to /etc/xdg/fuzzel/fuzzel.ini (read via XDG_CONFIG_DIRS, like the gtk/foot
# configs). fuzzel draws its own window with the colours below, so — unlike a
# GTK popup menu — it never depends on which GTK theme the session resolves.

font=Adwaita Sans:size=13
dpi-aware=no
prompt="Search "
icon-theme=Papirus-Dark
fields=name,generic,comment
line-height=26
lines=12
width=32
horizontal-pad=16
vertical-pad=12
inner-pad=8
anchor=center
layer=overlay

[colors]
# libadwaita dark tokens: #242226 window, white text, #3584e4 accent selection.
background=242226f5
text=ffffffff
prompt=ffffffff
placeholder=ffffff80
input=ffffffff
match=78aeedff
selection=3584e4ff
selection-text=ffffffff
selection-match=ffffffff
counter=ffffff80
border=1c1c1fff

[border]
width=1
radius=12
