# Nano Desktop foot terminal — modern Adwaita DARK.
# Installed to /etc/xdg/foot/foot.ini (foot reads it via XDG_CONFIG_DIRS, which
# includes /etc/xdg — the same mechanism as the gtk-3.0/sfwbar configs). Fonts
# and colours track the desktop's libadwaita look: Adwaita Mono text on an
# Adwaita-dark background with the GNOME/Tango ANSI palette (GNOME Terminal's
# long-standing default scheme). Decorations are left server-side so labwc
# draws the Adwaita titlebar, matching every other window.

# Adwaita Mono is the GNOME monospace default (shipped via adwaita-fonts);
# size 11 matches the 11pt used across the panel, menus and titlebars.
font=Adwaita Mono:size=11

# A little inner breathing room, as GNOME's terminals have.
pad=8x6

# The desktop is dark-only, so start in (and stay in) the dark palette below.
initial-color-theme=dark

[csd]
# Prefer server-side decorations: labwc draws the (Adwaita-styled) titlebar and
# window buttons, so foot's window looks identical to every other app.
preferred=server

[colors-dark]
# Adwaita dark window background / white foreground (libadwaita dark tokens).
background=242424
foreground=ffffff

# GNOME/Tango ANSI palette — GNOME Terminal's default colour scheme.
# Normal (0-7)
regular0=2e3436
regular1=cc0000
regular2=4e9a06
regular3=c4a000
regular4=3465a4
regular5=75507b
regular6=06989a
regular7=d3d7cf
# Bright (8-15)
bright0=555753
bright1=ef2929
bright2=8ae234
bright3=fce94f
bright4=729fcf
bright5=ad7fa8
bright6=34e2e2
bright7=eeeeec

# Selection uses the Adwaita accent (#3584e4) for a cohesive highlight.
selection-foreground=ffffff
selection-background=3584e4
urls=c4a000
